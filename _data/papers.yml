  - title: "Resting papers"
    papers:
      - title: "Florida Pill Mills and the U.S. Heroin Epidemic"
        url: "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=4275601"
        abstract: "The U.S. is in the midst of an opioid crisis that began in the 1990s with prescription opioids and has since evolved to include heroin and fentanyl. I show evidence that the 2010 crackdown on Florida pill mills catalyzed the shift from prescription opioids to heroin. Counties with higher exposure to diverted oxycodone from Florida pill mills experienced substantially more heroin overdose deaths after the crackdown. I then revisit a leading hypothesis that the 2010 reformulation of OxyContin initiated the heroin epidemic. I argue that the OxyContin reformulation is unlikely to be the primary driver for the rise in heroin deaths post-2010. I show the following: (i) OxyContin accounted for only 14.0% share of the prescription opioids market from 2006 to 2010, and (ii) counties with low pre-reformulation consumption of OxyContin also experienced large increases in heroin deaths."
